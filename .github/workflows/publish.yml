name: Build and Publish

# Builds the two wheels upstream gtsam-develop doesn't ship — cp310 macOS arm64
# (via Nix, on macos-14) and cp310 linux aarch64 (via cibuildwheel, on
# ubuntu-24.04-arm) — downloads every other wheel from upstream PyPI, renames
# everything to gtsam-extended at a single normalized version, and uploads to PyPI.
#
# This replicates what `./run/publish` does locally, plus building the two
# missing cp310 wheels first.
#
# The publish job runs on a macOS arm64 runner (for the Nix cp310 mac wheel); the
# cp310 linux-aarch64 wheel is built by the reusable build-cp310-linux-arm.yml job
# and pulled in as an artifact.
# Trigger manually from the Actions tab, or via auto-update.yml on a new upstream
# release.

on:
  # Manual fallback — trigger from the Actions tab.
  workflow_dispatch:
    inputs:
      skip_upload:
        description: "Build + rename only, skip the PyPI upload"
        type: boolean
        default: false
  # Reusable — called by auto-update.yml when upstream publishes a new version.
  workflow_call:
    inputs:
      skip_upload:
        description: "Build + rename only, skip the PyPI upload"
        type: boolean
        default: false

jobs:
  # Build the cp310 linux-aarch64 wheel on an ubuntu-24.04-arm runner. Its wheel
  # artifact (gtsam-cp310-manylinux2014-aarch64) is consumed by build-and-publish.
  build-linux-arm:
    uses: ./.github/workflows/build-cp310-linux-arm.yml
    with:
      gtsam_ref: develop

  build-and-publish:
    needs: build-linux-arm
    runs-on: macos-14 # Apple silicon (arm64) — matches the cp310 mac wheel target
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Resolve version (pin upstream for the whole run)
        run: |
          # System python3 (stdlib only) is enough for upstream_version.py.
          up=$(python3 run/upstream_version.py)
          target=$(python3 run/upstream_version.py --target)
          echo "Upstream gtsam-develop: $up"
          echo "Publishing as:          $target"
          # Pin both so download_wheels.py and rename_wheel.py agree on one release.
          echo "UPSTREAM_VERSION=$up" >> "$GITHUB_ENV"
          echo "TARGET_VERSION=$target" >> "$GITHUB_ENV"

      - name: Pin gtsam-src to the latest develop commit
        run: |
          # Re-pin the gtsam-src flake input (and refresh its hash in flake.lock)
          # so each publish builds from the current develop tip. This is what makes
          # the build self-healing: no manual sha256 bump when develop advances.
          nix flake update gtsam-src

      - name: Build cp310 macOS arm64 wheel (Nix)
        run: |
          nix build .#gtsam-wheel-cp310 -o result-cp310
          ls -lh result-cp310/*.whl

      - name: Download cp310 linux-aarch64 wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: gtsam-cp310-manylinux2014-aarch64
          path: arm-artifact

      - name: Stage linux-aarch64 wheel for collection
        run: |
          # download_wheels.py collects local wheels from result/ and result-*/.
          # Copy (recursively, to be robust to artifact nesting) into a result-* dir.
          mkdir -p result-cp310-linux-arm
          find arm-artifact -name '*.whl' -exec cp {} result-cp310-linux-arm/ \;
          ls -lh result-cp310-linux-arm/

      - name: Download upstream + rename + publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
          SKIP_UPLOAD: ${{ inputs.skip_upload && '1' || '' }}
        run: |
          # Run inside the flake devshell so python3 + twine are available.
          nix develop --command bash -euo pipefail -c '
            echo "=== Publishing gtsam-extended ${TARGET_VERSION} (upstream ${UPSTREAM_VERSION}) ==="
            python3 download_wheels.py
            rm -rf renamed_wheels
            python3 rename_wheel.py
            twine check renamed_wheels/*.whl
            if [ -n "${SKIP_UPLOAD}" ]; then
              echo "skip_upload set — not uploading. Wheels ready:"
              ls -lh renamed_wheels/
            else
              twine upload --non-interactive --skip-existing renamed_wheels/*.whl
            fi
          '
